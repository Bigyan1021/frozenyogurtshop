# Build

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Log in to DockerHub
    - name: Log in to dockerhub
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      
    # Build and Push the Docker image
    - name: Build and Push Docker Image
      run: |
        BRANCH_NAME=${{ github.ref_name }}
        docker build -t frozen-webapp -f Dockerfile .
        docker tag frozen-webapp:latest ${{ secrets.DOCKERHUB_USERNAME }}/frozen-webapp:$BRANCH_NAME
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/frozen-webapp:$BRANCH_NAME

    # Deploy Application
    - name: Deploy application
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.INSTANCA_IP }}
        username: ubuntu
        key: ${{ secrets.SSH_private_KEY }}
        options: "-o StrictHostKeyChecking=no"
        script: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          cd /home/ubuntu/frozen-webapp
          docker compose up -d (#If deploying for the first time)