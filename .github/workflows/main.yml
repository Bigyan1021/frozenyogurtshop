name: Build and Deploy backend app to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Log in to DockerHub
    - name: Log in to dockerhub
      run: |
        echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      
    # Build and Push the Docker image
    - name: Build and Push Docker Image
      run: |
        BRANCH_NAME=${{ github.ref_name }}
        docker build -t frozenyogurtshop -f Dockerfile .
        docker tag frozenyogurtshop:latest ${{ secrets.DOCKERHUB_USERNAME }}/frozenyogurtshop:$BRANCH_NAME
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/frozenyogurtshop:$BRANCH_NAME

    
